  owner
  viewer
}

type Mutation {
  acceptInvitation(name: String, token: String!): AcceptedInvitation!
  activateRoutingConfigVersion(configId: ID!, versionId: ID!): RoutingConfigDetail!
  archiveRoutingConfig(configId: ID!): RoutingConfigDetail!
  assignApiKeyRoutingConfig(apiKeyId: ID!, routingConfigId: ID): ApiKey!
  configurePromptCapture(promptCaptureMode: String!, retentionDays: Int!): PromptCaptureConfig!
  createApiKey(input: CreateApiKeyInput!): CreateApiKeyResult!
  createInvitation(input: CreateInvitationInput!): InvitationActionResult!
  createRoutingConfig(input: CreateRoutingConfigInput!): RoutingConfigDetail!
  createRoutingConfigVersion(config: JSON!, configId: ID!): RoutingConfigDetail!
  deactivateUser(userId: ID!): UserStatusResult!
  login(email: String!, password: String!): Viewer!
  logout: Boolean!
  reactivateUser(userId: ID!): UserStatusResult!
  resendInvitation(invitationId: ID!): InvitationActionResult!
  revokeApiKey(apiKeyId: ID!): ApiKey!
  revokeInvitation(invitationId: ID!): Invitation
  switchOrganization(organizationId: ID!): Viewer!
  updateSettings(input: SettingsInput!): Settings!
  updateUserRole(role: MemberRole!, userId: ID!): UpdateUserRoleResult!
}

